spring:
  servlet:
    multipart:
      max-file-size: 120MB
      max-request-size: 120MB
  application:
    name: minecraft-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  jackson:
    default-property-inclusion: non_null
    time-zone: Europe/Madrid

jwt:
  expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info